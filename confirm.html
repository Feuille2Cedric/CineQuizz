<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Compte Confirme | CineQuizz</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./config.js"></script>
    <style>
      :root {
        --bg: #f4ede2;
        --panel: rgba(255, 249, 240, 0.94);
        --line: rgba(78, 48, 19, 0.14);
        --text: #23160d;
        --muted: #6d5848;
        --accent: #bf4b28;
        --accent-dark: #8e2f15;
        --success: #18794e;
        --shadow: 0 24px 60px rgba(77, 48, 20, 0.12);
        --radius-xl: 28px;
        --radius-md: 16px;
        --font-ui: "Space Grotesk", "Trebuchet MS", sans-serif;
        --font-display: "Cormorant Garamond", Georgia, serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: var(--font-ui);
        color: var(--text);
        background:
          radial-gradient(circle at top right, rgba(191, 75, 40, 0.22), transparent 28%),
          radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.6), transparent 18%),
          radial-gradient(circle at bottom left, rgba(35, 22, 13, 0.08), transparent 24%),
          linear-gradient(135deg, #fbf6ef 0%, #f0e1cb 50%, #dcc29b 100%);
      }

      .confirm-card {
        width: min(100%, 640px);
        padding: 36px 32px;
        border: 1px solid var(--line);
        border-radius: var(--radius-xl);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.34), transparent),
          var(--panel);
        box-shadow: var(--shadow);
      }

      .eyebrow {
        margin: 0 0 10px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-size: 0.75rem;
        color: var(--accent-dark);
      }

      h1 {
        margin: 0 0 14px;
        font-family: var(--font-display);
        font-size: clamp(2.2rem, 7vw, 4.2rem);
        line-height: 0.95;
      }

      p {
        margin: 0;
        line-height: 1.7;
        color: var(--muted);
      }

      .status {
        margin-top: 22px;
        padding: 14px 16px;
        border-radius: var(--radius-md);
        background: rgba(24, 121, 78, 0.1);
        color: var(--success);
        border: 1px solid rgba(24, 121, 78, 0.14);
      }

      .status.is-error {
        background: rgba(191, 75, 40, 0.08);
        color: var(--accent-dark);
        border-color: rgba(191, 75, 40, 0.16);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 12px 18px;
        border-radius: 999px;
        border: 1px solid rgba(78, 48, 19, 0.12);
        color: var(--text);
        text-decoration: none;
        background: rgba(255, 248, 240, 0.74);
      }

      .button.primary {
        border: 0;
        color: #fff;
        background: linear-gradient(135deg, var(--accent), #dd7b4a);
      }
    </style>
  </head>
  <body>
    <main class="confirm-card">
      <p class="eyebrow">CineQuizz</p>
      <h1>Compte confirme</h1>
      <p>
        Votre adresse e-mail a bien ete validee. Vous pouvez maintenant revenir
        dans l'application et vous connecter normalement.
      </p>
      <p id="confirm-status" class="status">
        Confirmation recue. Vous pouvez ouvrir CineQuizz.
      </p>
      <div class="actions">
        <a class="button primary" href="./">Ouvrir CineQuizz</a>
      </div>
    </main>

    <script>
      const status = document.getElementById("confirm-status");
      const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ""));
      const searchParams = new URLSearchParams(window.location.search);

      function setStatus(message, isError = false) {
        status.textContent = message;
        status.classList.toggle("is-error", isError);
      }

      async function main() {
        const hashError = hashParams.get("error_description");
        const searchError = searchParams.get("error_description");

        if (hashError || searchError) {
          setStatus(decodeURIComponent(hashError || searchError), true);
          return;
        }

        const config = window.CINEQUIZZ_CONFIG;

        if (
          !config?.supabaseUrl ||
          !config?.supabaseAnonKey ||
          !window.supabase ||
          typeof window.supabase.createClient !== "function"
        ) {
          setStatus("Configuration Supabase introuvable sur cette page.", true);
          return;
        }

        const client = window.supabase.createClient(
          config.supabaseUrl,
          config.supabaseAnonKey,
          {
            auth: {
              persistSession: false,
              autoRefreshToken: false,
              detectSessionInUrl: true
            }
          }
        );

        const code = searchParams.get("code");

        if (code && typeof client.auth.exchangeCodeForSession === "function") {
          const { error } = await client.auth.exchangeCodeForSession(code);

          if (error) {
            setStatus(`Confirmation impossible: ${error.message}`, true);
            return;
          }

          setStatus("Compte confirme. Vous pouvez maintenant revenir sur CineQuizz.");
        } else {
          const type = hashParams.get("type") || searchParams.get("type");

          if (type === "signup" || type === "recovery") {
            setStatus("Compte confirme. Vous pouvez maintenant revenir sur CineQuizz.");
          }
        }

        if (window.location.search || window.location.hash) {
          history.replaceState(null, "", window.location.pathname);
        }
      }

      main().catch((error) => {
        setStatus(`Confirmation impossible: ${error.message}`, true);
      });
    </script>
  </body>
</html>
