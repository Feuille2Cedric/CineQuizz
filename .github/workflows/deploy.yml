name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Generate runtime config
        env:
          SUPABASE_URL: ${{ secrets.CINEQUIZZ_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.CINEQUIZZ_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::Missing CINEQUIZZ_SUPABASE_URL or CINEQUIZZ_SUPABASE_ANON_KEY GitHub secret."
            exit 1
          fi

          cat > config.js <<EOF
          window.CINEQUIZZ_CONFIG = {
            supabaseUrl: "${SUPABASE_URL}",
            supabaseAnonKey: "${SUPABASE_ANON_KEY}"
          };
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
